version: "3.8"

# ─────────────────────────────────────────────────────────────
# This file starts Kestra + its database on your local machine.
#
# HOW TO USE:
#   docker compose up -d        ← start Kestra in background
#   docker compose down         ← stop Kestra
#   docker compose down -v      ← stop + delete all data
#
# After starting, open: http://localhost:8080
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  # Kestra's internal database.
  # Stores flow definitions, execution history, logs.
  # You do not interact with this directly.
  postgres:
    image: postgres:15
    container_name: kestra_postgres
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    volumes:
      - kestra_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kestra"]
      interval: 10s
      retries: 5

  # ── Kestra ───────────────────────────────────────────────────
  # The orchestration tool.
  # Open http://localhost:8080 to see the UI.
  kestra:
    image: kestra/kestra:v0.20.0
    container_name: kestra
    pull_policy: always
    command: server standalone --worker-thread=128
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      KESTRA_GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      KESTRA_GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      KESTRA_GCP_LOCATION: ${GCP_LOCATION}
      KESTRA_GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON}
      KESTRA_KAGGLE_USERNAME: ${KAGGLE_USERNAME}
      KESTRA_KAGGLE_API_TOKEN: ${KAGGLE_API_TOKEN}
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
      - ../dbt:/app/dbt
      - ../credentials:/app/credentials
    user: "root"

volumes:
  kestra_postgres_data:
  kestra_data:
