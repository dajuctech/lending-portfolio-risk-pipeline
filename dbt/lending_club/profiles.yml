lending_club:
  target: dev
  outputs:

    # ── Used when running dbt manually from terminal ──────────
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: lending_club_staging
      location: "{{ env_var('GCP_LOCATION') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      threads: 4
      timeout_seconds: 300

    # ── Used when running dbt inside Kestra container ─────────
    kestra:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: lending_club_staging
      location: "{{ env_var('GCP_LOCATION') }}"
      keyfile: /app/credentials/gcp-service-account.json
      threads: 4
      timeout_seconds: 300
